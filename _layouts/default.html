<!DOCTYPE html>
<html>

    <script type="text/javascript">
        function add_lightbox(){
          $('.post-container img').each(
            function(index, val) {
              var link = $('<a></a>').attr({
                'rel': 'lightbox',
                'href': $(val).attr('src'),
                'data-lightbox':"roadtrip"
              });
            $(val).parent().prepend(link);
            link.append($(val));
            }
          )
        };
      </script>
      
      

{% include head.html %}

<!-- hack iOS CSS :active style -->
<body ontouchstart="" onload="add_lightbox()">
<!-- <body ontouchstart=""> -->


    {% include nav.html %}
    {% include search.html %}

    {{ content }}

    {% include footer.html %}


<!-- Image to hack wechat -->
<img src="/img/favicon/favicon.ico" width="0" height="0" />
<!-- Migrate from head to bottom, no longer block render and still work -->

</body>

</html>
